# Nimbusware local dev dependencies. Postgres user/db ``nimbusware`` for platform + agent store.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nimbusware
      POSTGRES_PASSWORD: nimbusware
      POSTGRES_DB: nimbusware
    ports:
      - "5432:5432"
    volumes:
      - nimbusware_pg:/var/lib/postgresql/data

  redis:
    profiles: ["worker"]
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  nimbusware_pg:

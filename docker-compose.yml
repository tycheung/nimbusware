services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes
    ports:
      - "5432:5432"
    volumes:
      - hermes_pg:/var/lib/postgresql/data

  redis:
    profiles: ["worker"]
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  hermes_pg:

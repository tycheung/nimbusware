[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nimbusware"
version = "0.5.0"
description = "Nimbusware platform (local-first) with Hermes orchestration agent. Python >=3.10; use 3.11+ when available."
authors = []
package-mode = true
packages = [
  { include = "agent_core", from = "packages" },
  { include = "hermes_store", from = "packages" },
  { include = "hermes_orchestrator", from = "packages" },
  { include = "nimbusware_api", from = "packages" },
  { include = "hermes_executor", from = "packages" },
  { include = "nimbusware_console", from = "packages" },
  { include = "hermes_extensions", from = "packages" },
  { include = "nimbusware_config", from = "packages" },
  { include = "nimbusware_env", from = "packages" },
  { include = "nimbusware_iam", from = "packages" },
  { include = "hermes_memory", from = "packages" },
  { include = "nimbusware_projections", from = "packages" },
  { include = "nimbusware_maker", from = "packages" },
  { include = "hermes_agent_tools", from = "packages" },
]

[tool.poetry.dependencies]
python = ">=3.10,<4"
pydantic = ">=2,<3"
pyyaml = ">=6"
httpx = ">=0.27"
fastapi = ">=0.115"
uvicorn = { version = ">=0.30", extras = ["standard"] }
psycopg = { version = ">=3.2", extras = ["binary"] }
streamlit = ">=1.39"
idna = ">=3.7"
numpy = ">=1.26"
pywebview = ">=5"

[tool.poetry.group.dev.dependencies]
pytest = ">=8"
pytest-benchmark = ">=4"
ruff = ">=0.8"
mypy = ">=1.13"
types-PyYAML = ">=6.0"
bandit = { version = ">=1.7", extras = ["toml"] }

[tool.poetry.group.faiss]
optional = true

[tool.poetry.group.faiss.dependencies]
faiss-cpu = ">=1.8"

[tool.poetry.group.redis]
optional = true

[tool.poetry.group.redis.dependencies]
redis = ">=5"

[tool.poetry.scripts]
nimbusware-api = "nimbusware_api.cli:main"
hermes-preflight = "hermes_orchestrator.preflight_cli:main"
nimbusware-config = "nimbusware_config.cli:main"
hermes-run-worker = "hermes_orchestrator.run_worker:main"
hermes-memory-index = "hermes_memory.cli:main"
hermes-memory-sync = "hermes_memory.sync_cli:main"
hermes-memory-replay = "hermes_orchestrator.replay_cli:main"
hermes-role-telemetry = "hermes_orchestrator.telemetry_cli:main"
hermes-routing-suggest = "hermes_orchestrator.routing_suggestions_cli:main"
hermes-fleet-ollama-sli = "hermes_orchestrator.fleet_ollama_sli_cli:main"
nimbusware-run = "nimbusware_env.run_app:main"
nimbusware-admin = "nimbusware_env.admin_app:main"
nimbusware-maker = "nimbusware_maker.cli:main"
nimbusware-launcher = "nimbusware_env.launcher_app:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["packages"]
markers = [
  "integration: requires PostgreSQL (set NIMBUSWARE_DATABASE_URL)",
  "benchmark: pytest-benchmark fleet harness (fo206)",
  "slow: long-running tests excluded from default CI unit job",
]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["packages", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.10"
strict = true
packages = [
  "agent_core",
  "hermes_store",
  "hermes_orchestrator",
  "nimbusware_api",
  "hermes_executor",
  "nimbusware_console",
  "hermes_extensions",
  "nimbusware_config",
  "nimbusware_env",
  "nimbusware_iam",
  "hermes_memory",
  "nimbusware_projections",
  "nimbusware_maker",
  "hermes_agent_tools",
]
mypy_path = "packages"

[[tool.mypy.overrides]]
module = ["streamlit.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["webview.*"]
ignore_missing_imports = true

name: Launch eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 0"

jobs:
  fixture-rubric:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Score attachable fixture workspace
        run: poetry run python scripts/launch_eval.py tests/fixtures/repos/tiny_python_app --json | tee launch_eval_report.json
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: launch-eval-scorecard
          path: launch_eval_report.json

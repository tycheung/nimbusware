name: Launch eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 0"

jobs:
  fixture-rubric:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Score attachable fixture workspaces
        run: |
          poetry run python scripts/benchmarks/launch_eval.py --matrix | tee launch_eval_matrix.json
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: launch-eval-scorecard
          path: launch_eval_matrix.json

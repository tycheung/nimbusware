name: Web UI tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "packages/maker_web/**"
      - "packages/admin_ui/**"
      - "packages/api/**"
      - "tests/e2e/web/**"
      - "tests/web/**"

jobs:
  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry
      - run: poetry install
      - name: Pytest web + API
        run: poetry run pytest tests/web tests/api_http/test_memory_influence_route.py tests/api_http/test_admin_ui_bff.py -q
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_DATABASE_URL: ""
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Vitest maker_web
        run: |
          cd packages/maker_web
          npm ci
          npm test
      - name: Vitest admin_ui
        run: |
          cd packages/admin_ui
          npm ci
          npm test
      - name: Playwright
        run: |
          cd tests/e2e/web
          npm ci
          npx playwright install chromium --with-deps
          npm test
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_DATABASE_URL: ""

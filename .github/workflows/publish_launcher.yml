name: Publish launcher

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: Attach artifacts to the GitHub release for this tag
        type: boolean
        default: false
  push:
    tags:
      - "launcher-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: scripts/publish/build_launcher.ps1
            shell: pwsh
          - os: macos-14
            build_script: scripts/publish/build_launcher.sh
            shell: bash
          - os: ubuntu-22.04
            build_script: scripts/publish/build_launcher.sh
            shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install Poetry
        shell: bash
        run: pip install poetry
      - name: Build launcher
        shell: ${{ matrix.shell }}
        run: |
          if [ "${{ matrix.shell }}" = "pwsh" ]; then
            ./${{ matrix.build_script }}
          else
            bash ${{ matrix.build_script }}
          fi
      - name: Rename release artifact
        shell: bash
        run: |
          poetry run python scripts/publish/rename_launcher_artifact.py
      - name: Package release archive
        shell: bash
        run: |
          poetry run python scripts/publish/package_launcher_release.py
          if [ "${{ runner.os }}" = "macOS" ]; then
            bash scripts/publish/package_launcher_macos.sh
          elif [ "${{ runner.os }}" = "Linux" ]; then
            bash scripts/publish/package_launcher_linux.sh
          fi
      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ runner.os }}
          path: |
            dist/NimbuswareLauncher-*
            dist/release/*
      - name: Publish to GitHub release
        if: >-
          startsWith(github.ref, 'refs/tags/launcher-v') ||
          (github.event_name == 'workflow_dispatch' && inputs.upload_release == true)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NimbuswareLauncher-*
            dist/release/*
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('launcher-v{0}', github.run_number) }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

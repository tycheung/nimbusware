name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Scraper response artifacts: CI does not run scripts/ops/prune_scraper_artifacts.py. Operators
# should schedule that script (cron / Windows Task Scheduler examples in its module docstring).
# Optional GitHub-hosted prune: .github/workflows/scraper_artifact_prune.yml (not invoked here);
# that workflow runs weekly with `--json-summary` logging and opens a `prune-failure`-labelled
# GitHub issue on any non-zero exit (fo125), so prune health is monitored out-of-band from CI.
#
# Bundle FAISS index smoke: not on push/PR (keeps default CI fast). Weekly + manual dispatch
# live in .github/workflows/bundle_faiss_index.yml (fo128 / PLAN_GAP §14 #12).

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Bundle FAISS stale check
        run: poetry run python scripts/faiss/rebuild_bundle_faiss_if_stale.py --dry-run
      - name: Ruff
        run: poetry run ruff check packages tests
      - name: Operator env audit
        run: poetry run python scripts/ci/audit_operator_env.py
      - name: OpenAPI TypeScript CI gate
        run: poetry run python scripts/ci/run_openapi_ts_ci_gate.py
      - name: Ruff format
        run: poetry run ruff format --check packages tests
      - name: Prune verbose comments gate
        run: poetry run python scripts/ci/run_prune_comments_ci_gate.py
      - name: Explainer export lint gate
        run: poetry run python scripts/ci/run_explainer_export_lint_gate.py
      - name: Workflow explainer init gate
        run: poetry run python scripts/ci/run_workflow_explainer_init_ci_gate.py
      - name: Workflow YAML line gate
        run: poetry run python scripts/ci/run_workflow_yaml_ci_gate.py
      - name: LOC budget gate
        run: poetry run python scripts/ci/run_loc_budget_ci_gate.py
      - name: Mypy
        run: poetry run mypy $(poetry run python scripts/ci/mypy_ci_targets.py)
      - name: Bandit
        run: poetry run bandit -c pyproject.toml -r packages -lll -q
      - name: Pip audit
        run: poetry run pip-audit
      - name: Pytest unit
        run: |
          poetry run pytest tests -q -m "not integration and not slow and not benchmark" \
            --cov=packages \
            --cov-report=term-missing:skip-covered \
            --cov-report=json:.ci_coverage.json \
            --cov-fail-under=75
          poetry run python scripts/ci/coverage_package_floors.py --report .ci_coverage.json
          rm -f .ci_coverage.json
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
      - name: slice.e2e CI gate
        run: poetry run pytest tests/e2e/journeys/test_slice_e2e_workflow.py::test_micro_slice_web_apply_emits_slice_e2e_stage -q
        env:
          NIMBUSWARE_SLICE_E2E_COMMAND: 'python -c "import pathlib; assert pathlib.Path(''index.html'').is_file(); print(''ok'')"'
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
      - name: Framework pack CI gate
        run: poetry run python scripts/ci/run_framework_pack_ci_gate.py
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
      - name: Bootstrap wheel CI gate
        run: poetry run python scripts/ci/run_bootstrap_ci_gate.py
      - name: Publish bootstrap workflow CI gate
        run: poetry run python scripts/ci/run_publish_bootstrap_ci_gate.py
      - name: Publish VS Code extension CI gate
        run: poetry run python scripts/ci/run_publish_vscode_ci_gate.py
      - name: Publish launcher CI gate
        run: poetry run python scripts/ci/run_publish_launcher_ci_gate.py
      - name: Playwright button CI gate
        run: poetry run python scripts/ci/run_playwright_button_ci_gate.py
      - name: Intent-to-patch SLO gate
        run: poetry run python scripts/ci/run_intent_to_patch_ci_gate.py
      - name: Classifier acceptance SLO gate
        run: poetry run python scripts/ci/run_classifier_acceptance_ci_gate.py
      - name: Archetype fit CI gate
        run: poetry run python scripts/ci/run_archetype_fit_ci_gate.py
      - name: Gate comprehension CI gate
        run: poetry run python scripts/ci/run_gate_comprehension_ci_gate.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: OpenAPI TypeScript full schema
        run: poetry run python scripts/codegen/openapi_to_ts.py
        env:
          NIMBUSWARE_OPENAPI_TS_REQUIRE_FULL: "1"
      - name: Vitest maker_web
        run: |
          cd packages/maker_web
          npm ci
          npm test
      - name: Vitest admin_ui
        run: |
          cd packages/admin_ui
          npm ci
          npm run build
          npm test
      - name: Playwright
        run: |
          cd tests/e2e/web
          npm ci
          npx playwright install chromium --with-deps
          npm test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nimbusware
          POSTGRES_PASSWORD: nimbusware
          POSTGRES_DB: nimbusware
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nimbusware -d nimbusware"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Maven
        run: sudo apt-get update -qq && sudo apt-get install -y -qq maven
      - name: Apply Postgres schema
        run: |
          export NIMBUSWARE_DATABASE_URL="postgresql://nimbusware:nimbusware@localhost:5432/nimbusware"
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          bash scripts/database/apply_event_store.sh
      - name: Integration tests
        run: poetry run pytest tests -q -m integration
        env:
          NIMBUSWARE_DATABASE_URL: postgresql://nimbusware:nimbusware@localhost:5432/nimbusware
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_SLICE_IMPLEMENT: stub
          NIMBUSWARE_SLICE_AUTO_ADVANCE: "0"
          NIMBUSWARE_USE_LLM: "0"

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nimbusware
          POSTGRES_PASSWORD: nimbusware
          POSTGRES_DB: nimbusware
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nimbusware -d nimbusware"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Install Playwright browser (Python e2e journeys)
        run: poetry run playwright install --with-deps chromium
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Maven
        run: sudo apt-get update -qq && sudo apt-get install -y -qq maven
      - name: Apply Postgres schema
        run: |
          export NIMBUSWARE_DATABASE_URL="postgresql://nimbusware:nimbusware@localhost:5432/nimbusware"
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          bash scripts/database/apply_event_store.sh
      - name: E2E tests
        run: poetry run pytest tests/e2e -q -m e2e --reruns 1 --reruns-delay 2
        env:
          NIMBUSWARE_DATABASE_URL: postgresql://nimbusware:nimbusware@localhost:5432/nimbusware
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_SLICE_IMPLEMENT: stub
          NIMBUSWARE_SLICE_P3_EVIDENCE: "0"
          NIMBUSWARE_USE_LLM: "0"
          NIMBUSWARE_E2E_FLAKE_RETRIES: "1"

  put_e2e_gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.pull_request.labels.*.name), 'put-e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: PUT E2E opt-in gate
        run: poetry run python scripts/ci/run_put_e2e_ci_gate.py
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}

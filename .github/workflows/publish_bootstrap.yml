name: Publish bootstrap wheel

on:
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build nimbusware-bootstrap wheel
        run: |
          pip install build
          python -m build packages/nimbusware_bootstrap
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbusware-bootstrap-wheel
          path: packages/nimbusware_bootstrap/dist/*.whl
          if-no-files-found: error

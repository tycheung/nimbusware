name: Publish bootstrap wheel

on:
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: Upload wheel to TestPyPI (requires TESTPYPI_API_TOKEN secret)
        type: boolean
        default: false
      publish_pypi:
        description: Upload wheel to PyPI (requires PYPI_API_TOKEN secret)
        type: boolean
        default: false

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Build nimbusware-bootstrap wheel
        run: |
          pip install build twine
          python -m build packages/bootstrap
          twine check packages/bootstrap/dist/*
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbusware-bootstrap-wheel
          path: packages/bootstrap/dist/*.whl
          if-no-files-found: error
      - name: Require TestPyPI token
        if: inputs.publish_testpypi == true
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          if [ -z "$TESTPYPI_API_TOKEN" ]; then
            echo "TESTPYPI_API_TOKEN secret is required when publish_testpypi=true"
            exit 1
          fi
      - name: Publish to TestPyPI
        if: inputs.publish_testpypi == true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: twine upload --repository testpypi --skip-existing packages/bootstrap/dist/*
      - name: TestPyPI install smoke
        if: inputs.publish_testpypi == true
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ nimbusware-bootstrap
          nimbusware-bootstrap --print-only
      - name: Require PyPI token
        if: inputs.publish_pypi == true
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "PYPI_API_TOKEN secret is required when publish_pypi=true"
            exit 1
          fi
      - name: Publish to PyPI
        if: inputs.publish_pypi == true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing packages/bootstrap/dist/*
      - name: Post-publish smoke
        if: inputs.publish_pypi == true
        run: |
          WHEEL=$(ls packages/bootstrap/dist/*.whl | head -1)
          pip install "$WHEEL"
          nimbusware-bootstrap --print-only

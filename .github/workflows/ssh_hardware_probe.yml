name: SSH hardware probe (optional)

on:
  workflow_dispatch:

jobs:
  ssh-probe-live:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Live SSH hardware probe
        env:
          NIMBUSWARE_EDITION: enterprise
          HERMES_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_HW_SSH_HOST: ${{ secrets.NIMBUSWARE_HW_SSH_HOST }}
          NIMBUSWARE_HW_SSH_IDENTITY: ${{ secrets.NIMBUSWARE_HW_SSH_IDENTITY }}
        run: |
          if [ -z "$NIMBUSWARE_HW_SSH_HOST" ]; then
            echo "Skip: NIMBUSWARE_HW_SSH_HOST secret not set"
            exit 0
          fi
          poetry run python -c "
          from nimbusware_hw.probe import probe_hardware_remote_ssh
          import os
          host = os.environ['NIMBUSWARE_HW_SSH_HOST']
          out = probe_hardware_remote_ssh(host)
          assert not out.get('errors') or out.get('tier'), out
          print('probe ok', out.get('tier'), out.get('remote_host'))
          "

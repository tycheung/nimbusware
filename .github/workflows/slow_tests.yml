name: Slow tests

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Pytest slow
        run: poetry run pytest tests -q -m slow
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"

  stack-soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Full replay stack soak
        run: >-
          poetry run pytest tests/e2e/journeys/test_full_replay_stack_soak.py
          -m "e2e_stack and slow" -q
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}

  redis-fleet-soak:
    runs-on: ubuntu-latest
    services:
      redis-a:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis-b:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install --with redis
      - name: Redis fleet dispatch stack soak
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
          NIMBUSWARE_REDIS_FLEET_URLS: redis://127.0.0.1:6379/0,redis://127.0.0.1:6380/0
        run: poetry run python scripts/ops/run_redis_fleet_soak_ci.py

  factory-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Factory golden replay (skip without Playwright)
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
        run: poetry run python scripts/benchmarks/run_factory_weekly_ci.py

  dev-env-weekly-soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - run: poetry run playwright install chromium
      - name: Persistent dev-env journey soak
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
        run: poetry run python scripts/ops/run_dev_env_weekly_soak.py

  fullstack-weekly-soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - run: poetry run playwright install chromium
      - name: Fullstack HTTP+UI launch soak
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
        run: poetry run python scripts/ops/run_fullstack_weekly_soak.py

  campaign-soak-preflight:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install --with redis
      - name: Campaign soak prerequisites
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
          NIMBUSWARE_EDITION: enterprise
          NIMBUSWARE_RUN_DISPATCH: redis
          NIMBUSWARE_REDIS_URL: redis://127.0.0.1:6379/0
        run: poetry run python scripts/ops/run_campaign_soak_check.py

  campaign-soak:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install --with redis
      - name: Campaign dispatch soak (staging weekly)
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
          NIMBUSWARE_EDITION: enterprise
          NIMBUSWARE_RUN_DISPATCH: redis
          NIMBUSWARE_REDIS_URL: redis://127.0.0.1:6379/0
          NIMBUSWARE_CAMPAIGN_SOAK_PASSES: "2"
        run: poetry run python scripts/ops/run_campaign_soak.py

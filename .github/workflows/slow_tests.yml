name: Slow tests

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Pytest slow
        run: poetry run pytest tests -q -m slow
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"

  stack-soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Full replay stack soak
        run: >-
          poetry run pytest tests/e2e/journeys/test_full_replay_stack_soak.py
          -m "e2e_stack and slow" -q
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}

  redis-fleet-soak:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install --with redis
      - name: Redis fleet dispatch stack soak
        env:
          NIMBUSWARE_SKIP_PREFLIGHT: "1"
          NIMBUSWARE_REPO_ROOT: ${{ github.workspace }}
          NIMBUSWARE_REDIS_URL: redis://127.0.0.1:6379/0
        run: poetry run python scripts/run_redis_fleet_soak_ci.py

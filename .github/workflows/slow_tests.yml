name: Slow tests

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry install
      - name: Pytest slow
        run: poetry run pytest tests -q -m slow
        env:
          HERMES_SKIP_PREFLIGHT: "1"

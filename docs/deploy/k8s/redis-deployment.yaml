apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusware-redis
  labels:
    app: nimbusware-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nimbusware-redis
  template:
    metadata:
      labels:
        app: nimbusware-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nimbusware-redis
spec:
  selector:
    app: nimbusware-redis
  ports:
    - port: 6379
      targetPort: 6379

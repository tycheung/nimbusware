apiVersion: v1
kind: Secret
metadata:
  name: nimbusware-api-secrets
type: Opaque
stringData:
  NIMBUSWARE_DATABASE_URL: postgresql://nimbusware:CHANGE_ME@postgres:5432/nimbusware
  NIMBUSWARE_ADMIN_TOKEN: CHANGE_ME_BEFORE_PROD
  # Optional — fleet Playwright pool (factory T3 / dev-env UI regression at scale)
  NIMBUSWARE_FLEET_PLAYWRIGHT_WS_ENDPOINT: ""
  # Optional — comma-separated Redis URLs for multi-broker fleet dispatch (Enterprise)
  NIMBUSWARE_REDIS_FLEET_URLS: ""

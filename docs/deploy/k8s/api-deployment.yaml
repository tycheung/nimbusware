apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusware-api
  labels:
    app: nimbusware-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nimbusware-api
  template:
    metadata:
      labels:
        app: nimbusware-api
    spec:
      containers:
        - name: api
          image: nimbusware-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nimbusware-api-secrets
          env:
            - name: NIMBUSWARE_REPO_ROOT
              value: /app
            - name: HERMES_SKIP_PREFLIGHT
              value: "1"
          readinessProbe:
            httpGet:
              path: /v1/platform/edition
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nimbusware-api
spec:
  selector:
    app: nimbusware-api
  ports:
    - port: 80
      targetPort: 8000

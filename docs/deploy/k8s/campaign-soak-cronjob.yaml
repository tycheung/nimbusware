apiVersion: batch/v1
kind: CronJob
metadata:
  name: nimbusware-campaign-soak
  labels:
    app: nimbusware-campaign-soak
spec:
  schedule: "0 3 1 * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: nimbusware-campaign-soak
        spec:
          restartPolicy: Never
          containers:
            - name: soak
              image: nimbusware-api:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "scripts/ops/run_campaign_soak.py"]
              envFrom:
                - secretRef:
                    name: nimbusware-api-secrets
              env:
                - name: NIMBUSWARE_REPO_ROOT
                  value: /app
                - name: NIMBUSWARE_EDITION
                  value: enterprise
                - name: NIMBUSWARE_RUN_DISPATCH
                  value: redis
                - name: NIMBUSWARE_SKIP_PREFLIGHT
                  value: "1"
                - name: NIMBUSWARE_CAMPAIGN_SOAK_PASSES
                  value: "2"

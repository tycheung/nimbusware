# Reference Ingress for raw kubectl installs. Replace host and TLS secret before production use.
# Helm installs: prefer charts/nimbusware with ingress.enabled=true (see docs/deploy/helm.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nimbusware-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  rules:
    - host: nimbusware.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nimbusware-api
                port:
                  number: 80
  tls:
    - hosts:
        - nimbusware.example.com
      secretName: nimbusware-api-tls

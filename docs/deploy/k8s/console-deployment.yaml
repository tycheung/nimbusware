# Legacy optional manifest — Admin UI is served by the API Deployment at /v1/admin/app/.
# Prefer applying api-deployment.yaml only; do not run a separate Streamlit console pod.
#
# If you still want a dedicated Service name for Admin bookmarks, point it at the API
# Service (nimbusware-api) on port 8000 and open /v1/admin/app/ in the browser.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nimbusware-admin-console-note
data:
  readme: |
    Admin Console is the Preact SPA bundled with nimbusware-api.
    Apply api-deployment.yaml and route operators to http://<api>/v1/admin/app/
    Enterprise fleet panels: http://<api>/v1/admin/app/fleet

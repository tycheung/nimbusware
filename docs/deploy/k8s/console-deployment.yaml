apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusware-admin-console
  labels:
    app: nimbusware-admin-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nimbusware-admin-console
  template:
    metadata:
      labels:
        app: nimbusware-admin-console
    spec:
      containers:
        - name: console
          image: nimbusware-api:latest
          imagePullPolicy: IfNotPresent
          command:
            [
              "streamlit",
              "run",
              "packages/nimbusware_console/app.py",
              "--server.port",
              "8502",
              "--server.address",
              "0.0.0.0",
            ]
          ports:
            - containerPort: 8502
          envFrom:
            - secretRef:
                name: nimbusware-api-secrets
          env:
            - name: NIMBUSWARE_API_BASE
              value: http://nimbusware-api/v1
            - name: NIMBUSWARE_REPO_ROOT
              value: /app
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nimbusware-admin-console
spec:
  selector:
    app: nimbusware-admin-console
  ports:
    - port: 80
      targetPort: 8502

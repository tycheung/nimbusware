edition: individual

image:
  api: nimbusware-api:latest
  worker: nimbusware-api:latest
  pullPolicy: IfNotPresent

api:
  replicas: 1
  servicePort: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

worker:
  enabled: true
  replicas: 1

redis:
  enabled: true
  image: redis:7-alpine

labPostgres:
  enabled: false
  image: postgres:16-alpine
  user: nimbusware
  password: nimbusware
  database: nimbusware

secrets:
  databaseUrl: postgresql://nimbusware:nimbusware@postgres:5432/nimbusware
  adminToken: change-me-before-prod
  # Optional managed Redis (when redis.enabled=false). Use redisFleetUrls for multi-broker fleets.
  redisUrl: ""
  redisFleetUrls: ""
  # Optional remote Playwright pool for factory T3 / dev-env UI regression at scale.
  fleetPlaywrightWs: ""

ingress:
  enabled: false
  host: nimbusware.local
  className: ""
  annotations: {}
  tls: false
  tlsSecretName: nimbusware-api-tls

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  capabilities:
    drop:
      - ALL

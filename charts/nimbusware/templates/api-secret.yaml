apiVersion: v1
kind: Secret
metadata:
  name: nimbusware-api-secrets
type: Opaque
stringData:
  NIMBUSWARE_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  NIMBUSWARE_ADMIN_TOKEN: {{ .Values.secrets.adminToken | quote }}
  {{- if .Values.secrets.redisFleetUrls }}
  NIMBUSWARE_REDIS_FLEET_URLS: {{ .Values.secrets.redisFleetUrls | quote }}
  NIMBUSWARE_REDIS_URL: {{ (splitList "," .Values.secrets.redisFleetUrls | first) | trim | quote }}
  {{- else if .Values.secrets.redisUrl }}
  NIMBUSWARE_REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.fleetPlaywrightWs }}
  NIMBUSWARE_FLEET_PLAYWRIGHT_WS_ENDPOINT: {{ .Values.secrets.fleetPlaywrightWs | quote }}
  {{- end }}

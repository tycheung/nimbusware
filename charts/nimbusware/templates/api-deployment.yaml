apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusware-api
  labels:
    app: nimbusware-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: nimbusware-api
  template:
    metadata:
      labels:
        app: nimbusware-api
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/api-secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.image.api }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.api.servicePort }}
          envFrom:
            - secretRef:
                name: nimbusware-api-secrets
          env:
            - name: NIMBUSWARE_EDITION
              value: {{ .Values.edition | quote }}
            - name: NIMBUSWARE_REPO_ROOT
              value: /app
            - name: NIMBUSWARE_SKIP_PREFLIGHT
              value: "1"
            {{- if or .Values.redis.enabled .Values.secrets.redisUrl .Values.secrets.redisFleetUrls }}
            - name: NIMBUSWARE_RUN_DISPATCH
              value: redis
            {{- if and .Values.redis.enabled (not .Values.secrets.redisUrl) (not .Values.secrets.redisFleetUrls) }}
            - name: NIMBUSWARE_REDIS_URL
              value: redis://redis:6379/0
            {{- end }}
            {{- end }}
            {{- if .Values.secrets.fleetPlaywrightWs }}
            - name: NIMBUSWARE_FLEET_PLAYWRIGHT_WS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nimbusware-api-secrets
                  key: NIMBUSWARE_FLEET_PLAYWRIGHT_WS_ENDPOINT
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/platform/edition
              port: {{ .Values.api.servicePort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/platform/edition
              port: {{ .Values.api.servicePort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

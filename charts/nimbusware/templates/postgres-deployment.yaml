{{- if .Values.labPostgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusware-postgres
  labels:
    app.kubernetes.io/name: nimbusware-postgres
    nimbusware.io/lab-only: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nimbusware-postgres
  template:
    metadata:
      labels:
        app: nimbusware-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.labPostgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.labPostgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.labPostgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.labPostgres.database | quote }}
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: nimbusware-postgres
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}

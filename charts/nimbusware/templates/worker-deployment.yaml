{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbusware-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: nimbusware-worker
  template:
    metadata:
      labels:
        app: nimbusware-worker
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/api-secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ .Values.image.worker }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["python", "scripts/run_dispatch_worker.py"]
          envFrom:
            - secretRef:
                name: nimbusware-api-secrets
          env:
            - name: NIMBUSWARE_EDITION
              value: {{ .Values.edition | quote }}
            - name: NIMBUSWARE_REPO_ROOT
              value: /app
            {{- if or .Values.redis.enabled .Values.secrets.redisUrl .Values.secrets.redisFleetUrls }}
            - name: NIMBUSWARE_RUN_DISPATCH
              value: redis
            {{- if and .Values.redis.enabled (not .Values.secrets.redisUrl) (not .Values.secrets.redisFleetUrls) }}
            - name: NIMBUSWARE_REDIS_URL
              value: redis://redis:6379/0
            {{- end }}
            {{- end }}
            {{- if .Values.secrets.fleetPlaywrightWs }}
            - name: NIMBUSWARE_FLEET_PLAYWRIGHT_WS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nimbusware-api-secrets
                  key: NIMBUSWARE_FLEET_PLAYWRIGHT_WS_ENDPOINT
            {{- end }}
{{- end }}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a5fb4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Maker" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <title>Hermes Maker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Hermes Maker</h1>
      <p class="subtitle">Run theater, research approvals, and slice progress</p>
    </header>
    <main>
      <section class="panel">
        <label for="run-theater-run-id">Run ID</label>
        <input id="run-theater-run-id" type="text" placeholder="uuid" autocomplete="off" inputmode="text" />
        <div class="actions">
          <button id="btn-load-theater" type="button">Load theater</button>
          <button id="btn-load-research" type="button">Load research</button>
          <button id="btn-load-slices" type="button">Load slices</button>
          <button id="btn-poll-theater" type="button">Poll theater</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
      <section class="panel" id="slice-panel">
        <h2>Slice progress</h2>
        <p id="slice-summary" class="slice-summary"></p>
        <ol id="slice-list" class="slice-list"></ol>
      </section>
      <section class="panel">
        <h2>Theater</h2>
        <ul id="theater-list"></ul>
      </section>
      <section class="panel">
        <h2>Research briefs</h2>
        <ul id="research-list"></ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>

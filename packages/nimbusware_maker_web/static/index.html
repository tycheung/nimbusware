<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f77b4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Maker" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Nimbusware Maker</title>
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body x-data="makerShell" x-init="init()" @maker-toast.window="showToast($event.detail)">
    <div class="app-layout">
      <aside class="sidebar" x-show="!mobileMode">
        <h1 class="brand">Nimbusware Maker</h1>
        <nav class="nav sidebar-nav">
          <template x-for="tab in tabs" :key="tab.id">
            <a
              :href="'#' + tab.hash"
              class="nav-link"
              :class="{ active: route === tab.hash }"
              @click.prevent="navigate(tab.hash)"
              x-text="tab.label"
            ></a>
          </template>
        </nav>
        <p class="edition" x-text="editionLabel"></p>
        <a class="admin-link" href="/v1/admin/app/" target="_blank" rel="noopener">Admin console</a>
      </aside>
      <main class="main">
        <header
          class="mobile-run-bar"
          x-show="mobileMode && (route === '/progress' || route === '/review')"
        >
          <label for="mobile-run-id">Run ID</label>
          <input id="mobile-run-id" type="text" placeholder="uuid" autocomplete="off" />
        </header>
        <div
          class="quick-banner"
          x-show="quickModeActive && !quickBannerDismissed"
          role="status"
        >
          <span>Quick local mode — runs use in-memory store and quick_local workflow.</span>
          <button type="button" @click="dismissQuickBanner()">Dismiss</button>
        </div>
        <div class="toast" x-show="toastMsg" x-text="toastMsg" :class="toastKind"></div>
        <div id="view-home" class="view" x-show="route === '/home'">
          <h2>Home</h2>
          <p class="muted">Projects and readiness — loading…</p>
          <div id="home-mount"></div>
        </div>
        <div id="view-build" class="view" x-show="route === '/build'">
          <h2>Build</h2>
          <div id="build-mount"></div>
        </div>
        <div id="view-review" class="view" x-show="route === '/review'">
          <h2>Review</h2>
          <div id="review-mount"></div>
        </div>
        <input id="run-theater-run-id" type="hidden" aria-hidden="true" />
        <div id="view-progress" class="view" x-show="route === '/progress'">
          <h2>Progress</h2>
          <div class="desktop-run-id" x-show="!mobileMode">
            <label for="desktop-run-id">Run ID</label>
            <input id="desktop-run-id" type="text" placeholder="uuid" autocomplete="off" />
          </div>
          <div id="progress-mount"></div>
        </div>
        <div id="view-models" class="view" x-show="route === '/models'">
          <h2>Models</h2>
          <div id="models-mount"></div>
        </div>
        <div id="view-settings" class="view" x-show="route === '/settings'">
          <h2>Settings</h2>
          <div id="settings-mount"></div>
        </div>
        <p id="status" class="status" aria-live="polite" x-text="statusText"></p>
      </main>
      <nav class="mobile-bottom-nav" x-show="mobileMode" aria-label="Mobile navigation">
        <template x-for="tab in tabs" :key="tab.id">
          <a
            :href="'#' + tab.hash"
            class="mobile-tab"
            :class="{ active: route === tab.hash }"
            @click.prevent="navigate(tab.hash)"
            x-text="tab.label"
          ></a>
        </template>
      </nav>
    </div>
    <script defer src="vendor/alpine.min.js"></script>
    <script type="module" src="js/bootstrap-load.js"></script>
    <script type="module" src="js/app-shell.js"></script>
    <script type="module" src="js/tab-loader.js"></script>
  </body>
</html>

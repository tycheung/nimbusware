# pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(packages|tests)/
      - id: ruff-format
        files: ^(packages|tests)/
  - repo: local
    hooks:
      - id: ci-ruff-parity
        name: ruff check (CI parity, no fix)
        entry: poetry run ruff check packages tests
        language: system
        pass_filenames: false
        files: ^(packages|tests)/
      - id: python-compileall
        name: compileall packages
        entry: poetry run python -m compileall -q packages
        language: system
        pass_filenames: false
        files: ^packages/.*\.py$
      - id: mypy-services
        name: mypy (services + tranche B + API pilot, CI parity fo701/fo724/fo764)
        entry: poetry run mypy packages/nimbusware_console/services packages/nimbusware_maker/services packages/nimbusware_projections packages/nimbusware_client packages/hermes_agent_tools packages/nimbusware_api/routes/ollama.py packages/nimbusware_api/schemas/ollama.py packages/nimbusware_api/errors.py
        language: system
        pass_filenames: false
        files: ^packages/(nimbusware_console/services|nimbusware_maker/services|nimbusware_projections|nimbusware_client|hermes_agent_tools|nimbusware_api/routes/ollama.py|nimbusware_api/schemas/ollama.py|nimbusware_api/errors.py)/

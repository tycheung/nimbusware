# pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(packages|tests)/
      - id: ruff-format
        files: ^(packages|tests)/
  - repo: local
    hooks:
      - id: ci-ruff-parity
        name: ruff check (CI parity, no fix)
        entry: poetry run ruff check packages tests
        language: system
        pass_filenames: false
        files: ^(packages|tests)/
      - id: python-compileall
        name: compileall packages
        entry: poetry run python -m compileall -q packages
        language: system
        pass_filenames: false
        files: ^packages/.*\.py$
      - id: mypy-services
        name: mypy (CI targets via scripts/mypy_ci_targets.py)
        entry: bash -c 'poetry run mypy $(poetry run python scripts/mypy_ci_targets.py)'
        language: system
        pass_filenames: false
        files: ^packages/

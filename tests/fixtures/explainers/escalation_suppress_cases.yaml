slug: escalation_suppress

payload_cases:
  - id: no_escalation_key_bare
    workflow_profile: bare
    workflow_yaml: |
      version: 1
    expect:
      escalation_yaml_key_present: false
      escalation_yaml_value: null
      suppress_automatic_escalation_yaml_raw: null
      suppress_automatic_escalation_effective: false
      load_error: null
      suppress_automatic_escalation_yaml_raw_type: null
      workflow_yaml_top_level_version_int: 1

  - id: no_escalation_key_sup_on
    workflow_profile: sup_on
    workflow_yaml: |
      version: 1
      escalation:
        suppress_automatic_escalation: true
    expect:
      escalation_yaml_key_present: true
      suppress_automatic_escalation_effective: true
      suppress_automatic_escalation_yaml_raw: true
      suppress_automatic_escalation_yaml_raw_type: bool
      workflow_yaml_top_level_version_int: 1

  - id: suppress_false
    workflow_profile: sup_off
    workflow_yaml: |
      version: 1
      escalation:
        suppress_automatic_escalation: false
    expect:
      suppress_automatic_escalation_effective: false
      suppress_automatic_escalation_yaml_raw: false
      suppress_automatic_escalation_yaml_raw_type: bool
      workflow_yaml_top_level_version_int: 1

  - id: string_yes_truthy
    workflow_profile: yes_str
    workflow_yaml: |
      version: 1
      escalation:
        suppress_automatic_escalation: "yes"
    expect:
      suppress_automatic_escalation_effective: true
      suppress_automatic_escalation_yaml_raw_type: str
      workflow_yaml_top_level_version_int: 1

  - id: malformed_escalation_scalar
    workflow_profile: bad_esc
    workflow_yaml: |
      version: 1
      escalation: true
    expect:
      escalation_yaml_key_present: true
      escalation_yaml_value: true
      suppress_automatic_escalation_yaml_raw: null
      suppress_automatic_escalation_effective: false
      suppress_automatic_escalation_yaml_raw_type: null
      workflow_yaml_top_level_version_int: 1

  - id: version_missing
    workflow_profile: no_ver
    workflow_yaml: |
      escalation:
        suppress_automatic_escalation: false
    expect:
      workflow_yaml_top_level_version_int: null
      escalation_yaml_key_present: true

  - id: version_non_int
    workflow_profile: v_bad
    workflow_yaml: |
      version: "1"
      escalation:
        suppress_automatic_escalation: false
    expect:
      workflow_yaml_top_level_version_int: null

  - id: policy_absent
    workflow_profile: bare
    workflow_yaml: |
      version: 1
    expect:
      escalation_policy_yaml_path_exists: false
      escalation_policy_yaml_relpath: null
      escalation_policy_yaml_file_bytes: null
      escalation_policy_yaml_mtime_iso: null
      escalation_policy_yaml_top_level_key_count: 0
      escalation_policy_yaml_top_level_keys_sample: []
      escalation_policy_yaml_top_level_kinds:
        mapping: 0
        scalar: 0
        list: 0
        other: 0
      escalation_policy_yaml_load_error: null
      escalation_policy_yaml_has_verification_mapping: null
      escalation_policy_yaml_has_anti_deadlock_mapping: null

  - id: scalar_retry_fields
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      max_retries_per_stage: 5
      deadlock_escalation_after_minutes: 12
    expect:
      escalation_policy_yaml_max_retries_per_stage: 5
      escalation_policy_yaml_deadlock_escalation_after_minutes: 12
      escalation_policy_yaml_version: 1
      escalation_policy_yaml_anti_deadlock_enabled: null

  - id: rejects_non_int_max_retries
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      max_retries_per_stage: true
      deadlock_escalation_after_minutes: "12"
    expect:
      escalation_policy_yaml_max_retries_per_stage: null

  - id: rejects_non_int_deadlock_minutes
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      max_retries_per_stage: true
      deadlock_escalation_after_minutes: "12"
    expect:
      escalation_policy_yaml_deadlock_escalation_after_minutes: null

  - id: rejects_non_int_anti_deadlock_min_progress
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      anti_deadlock:
        min_progress_events: not_int
    expect:
      escalation_policy_yaml_anti_deadlock_min_progress_events: null

  - id: anti_deadlock_enabled_false
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 2
      anti_deadlock:
        enabled: false
        min_progress_events: 1
    expect:
      escalation_policy_yaml_version: 2
      escalation_policy_yaml_anti_deadlock_enabled: false
      escalation_policy_yaml_anti_deadlock_min_progress_events: 1

  - id: anti_deadlock_min_progress_only
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      anti_deadlock:
        min_progress_events: 9
    expect:
      escalation_policy_yaml_has_anti_deadlock_mapping: true
      escalation_policy_yaml_anti_deadlock_enabled: null
      escalation_policy_yaml_anti_deadlock_min_progress_events: 9

  - id: anti_deadlock_mapping_true
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      anti_deadlock:
        max_retries: 1
    expect:
      escalation_policy_yaml_has_anti_deadlock_mapping: true
      escalation_policy_yaml_max_retries_per_stage: null
      escalation_policy_yaml_deadlock_escalation_after_minutes: null
      escalation_policy_yaml_anti_deadlock_min_progress_events: null

  - id: anti_deadlock_scalar_false
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      anti_deadlock: true
    expect:
      escalation_policy_yaml_has_anti_deadlock_mapping: false

  - id: verification_mapping_true
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
      verification:
        auto_escalate_after_cumulative_findings: null
    expect:
      escalation_policy_yaml_has_verification_mapping: true

  - id: top_level_kinds_mixed
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      a: {x: 1}
      b: 1
      c: [1, 2]
      d: null
      e: hello
    expect:
      escalation_policy_yaml_top_level_kinds:
        mapping: 1
        scalar: 3
        list: 1
        other: 0
      escalation_policy_yaml_top_level_key_count: 5

  - id: age_seconds_absent_policy
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    expect:
      escalation_policy_yaml_path_exists: false
      escalation_policy_yaml_age_seconds: null

  - id: age_seconds_fresh_small
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      version: 1
    expect_type:
      escalation_policy_yaml_age_seconds: int
    expect_int_range:
      escalation_policy_yaml_age_seconds:
        min: 0
        max: 300

  - id: age_seconds_load_error
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      : : not yaml
    expect_type:
      escalation_policy_yaml_load_error: str
    expect:
      escalation_policy_yaml_age_seconds: null

  - id: malformed_policy_load_error
    workflow_profile: wf
    workflow_yaml: |
      version: 1
    policy_yaml: |
      : not valid yaml :
    expect:
      escalation_policy_yaml_path_exists: true
      escalation_policy_yaml_top_level_key_count: 0
      escalation_policy_yaml_top_level_keys_sample: []
      escalation_policy_yaml_top_level_kinds:
        mapping: 0
        scalar: 0
        list: 0
        other: 0
      load_error: null
    expect_nonempty_str:
      - escalation_policy_yaml_load_error
    expect_get_null:
      - escalation_policy_yaml_has_verification_mapping
      - escalation_policy_yaml_has_anti_deadlock_mapping


version: 1
# When true, emit ``gate.decision.emitted`` after verify (no ``HERMES_EMIT_INTEGRATOR_GATE`` env).
# Workflow ``integrator_gate.enabled`` in ``configs/workflows/{profile}.yaml`` also enables emission.

# Hotfix lane: one bounded slice, minimal stages, no E2E. workflow_profile=patch
version: 1
fast_slice: true

slice:
  enabled: true
  max_files: 2
  max_loc: 60
  allowed_globs:
    - "**/*.py"
    - "**/*.{js,ts,tsx,vue}"
    - "**/*.{html,css}"
  e2e:
    enabled: false

stage_graph:
  - stage_name: slice.plan
  - stage_name: slice.implement
    depends_on: [slice.plan]
  - stage_name: slice.verify
    depends_on: [slice.implement]
  - stage_name: slice.test
    depends_on: [slice.verify]
  - stage_name: slice.gate
    depends_on: [slice.test]

universal_critique:
  default_enabled: false
  unanimous_gate_enforce: false

agent_evaluator:
  enabled: false

integrator_gate:
  enabled: false

research:
  enabled: false

stitch:
  enabled: false

self_refinement:
  enabled: false

maker_approval:
  enabled: false

patch:
  auto_apply_policy:
    max_loc: 40
    max_files: 1
    require_tests_passed: true
    max_gate_severity: MEDIUM
  targeted_test: true
  skip_run_plan: true
  risk_caps:
    max_tool_steps: 12
    max_shell_invocations: 3
    max_write_bytes: 65536

theater:
  enabled: true
  max_message_chars: 1200
  show_evidence_links: true
  llm_summary: false

memory:
  retrieval_enabled: true
  index_contribution: true
  retrieval_k: 3
  excerpt_max_chars: 1500
  embedding_mode: deterministic

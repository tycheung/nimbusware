# Workflow profile: universal critique panels on by default (§14 #16 default-on slice).
# Per-panel ``enabled`` may be omitted; env kill-switches (``=0``/``false``/``no``) still win.
version: 1
finding_fix_strictness:
  minimum_severity_requiring_fixes: MEDIUM
  also_require_fixes_for_low_severity: false
network_egress:
  scraper_role_allowlist: null
  domain_allowlist: null
  budget_bytes_per_run: null
scraper_fetch:
  enabled: false
  url: null
  urls: null
  actor_role_key: backend_writer
  max_attempts: 1
  backoff_seconds: 0
  max_bytes: null
  body_snippet_max_bytes: 256
  persist_artifacts_max_bytes_per_url: null
security_scan_metadata_on_verify: false
agent_evaluator:
  enabled: false
  persona_id: default
integrator_gate:
  enabled: false
self_refinement:
  enabled: false
universal_critique:
  default_enabled: true
  implementation: {}
  test_writer: {}
  planner: {}
escalation:
  suppress_automatic_escalation: false

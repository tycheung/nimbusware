# v1 production-oriented workflow profile (B1: default-on critique + evaluator depth).
extends: default
version: 1
agent_evaluator:
  enabled: true
  persona_id: default
  llm_evaluation_enabled: true
  persona_coverage_critique:
    enabled: true
    stub: true
integrator_gate:
  enabled: false
self_refinement:
  enabled: true
  llm_critique_enabled: true
  max_iterations: 2
  ungated_loop: false
universal_critique:
  default_enabled: true
  unanimous_gate_enforce: true
  implementation:
    llm: false
    stub: true
  test_writer:
    enabled: true
  planner:
    enabled: true
integration_adapter_writer:
  enabled: true
  stub_only: false
security_critique:
  enabled: true
  stub: true
  llm_enabled: false
  severity_floor: MEDIUM
performance_critique:
  enabled: true
  stub: true
  llm_enabled: false
  severity_floor: MEDIUM
network_resilience_critique:
  enabled: true
  stub: true
  llm_enabled: false
  backend_only: true
  severity_floor: MEDIUM
refactor:
  enabled: true
  stub_only: false
  max_iterations: 1
  orphan_gate_max: 15
memory:
  retrieval_enabled: true
  index_contribution: true
  retrieval_k: 5
  excerpt_max_chars: 2000
  embedding_mode: deterministic
research:
  enabled: false
  domain_enabled: true
  code_enabled: true
stitch:
  enabled: false

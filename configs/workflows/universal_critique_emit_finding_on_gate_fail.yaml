# Optional profile: emit LOW severity finding when last critique gate for a stage is FAIL.
# Default runs keep this off via default.yaml; operators opt in explicitly (no env required).
extends: default
version: 1
universal_critique:
  implementation:
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  test_writer:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  planner:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  frontend_writer:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  module_integrator:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true

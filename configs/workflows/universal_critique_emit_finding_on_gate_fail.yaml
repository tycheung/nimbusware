# Optional profile: emit LOW severity finding when last critique gate for a stage is FAIL.
# Default runs keep this off via default.yaml; operators opt in explicitly (no env required).
version: 1
finding_fix_strictness:
  minimum_severity_requiring_fixes: MEDIUM
  also_require_fixes_for_low_severity: false
network_egress:
  scraper_role_allowlist: null
  domain_allowlist: null
  budget_bytes_per_run: null
scraper_fetch:
  enabled: false
  url: null
  urls: null
  actor_role_key: backend_writer
  max_attempts: 1
  backoff_seconds: 0
  max_bytes: null
  body_snippet_max_bytes: 256
  persist_artifacts_max_bytes_per_url: null
security_scan_metadata_on_verify: false
agent_evaluator:
  enabled: false
  persona_id: default
integrator_gate:
  enabled: false
self_refinement:
  enabled: false
universal_critique:
  implementation:
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  test_writer:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  planner:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  frontend_writer:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
  module_integrator:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: false
    emit_finding_on_gate_fail: true
escalation:
  suppress_automatic_escalation: false

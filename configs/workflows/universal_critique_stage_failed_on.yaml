# Optional profile: keep critique panels disabled but enable stage-failed hooks
# when matching critique gate verdict is FAIL (no env required).
extends: default
version: 1
universal_critique:
  implementation:
    llm: false
    stub: false
    stage_failed_on_gate_fail: true
  test_writer:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: true
  planner:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: true
  frontend_writer:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: true
  module_integrator:
    enabled: false
    llm: false
    stub: false
    stage_failed_on_gate_fail: true

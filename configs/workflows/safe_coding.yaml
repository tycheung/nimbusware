# Safe Coding workflow — fullstack gates with approval and industry critics.
version: 1
fast_slice: false

slice:
  enabled: true
  max_files: 3
  max_loc: 120
  allowed_globs:
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.html"
    - "**/package.json"
  e2e:
    enabled: true

dev_env:
  enabled: true
  human_fidelity:
    enabled: true
  ui_controller:
    enabled: true
    required: false

launch_test:
  enabled: true

stage_graph:
  - stage_name: plan
  - stage_name: slice.plan
    depends_on: [plan]
  - stage_name: slice.implement
    depends_on: [slice.plan]
  - stage_name: slice.verify
    depends_on: [slice.implement]
  - stage_name: slice.critique
    depends_on: [slice.verify]
  - stage_name: slice.test
    depends_on: [slice.critique]
  - stage_name: launch_test.plan
    depends_on: [slice.test]
  - stage_name: launch_test.write
    depends_on: [launch_test.plan]
  - stage_name: launch_test.critique
    depends_on: [launch_test.write]
  - stage_name: slice.e2e
    depends_on: [launch_test.critique]
  - stage_name: dev_env.human_fidelity
    depends_on: [slice.e2e]
  - stage_name: slice.gate
    depends_on: [dev_env.human_fidelity]

universal_critique:
  default_enabled: true
  unanimous_gate_enforce: true
  critic_pack_id: default-security
  industry_critic_pack_ids:
    - fintech-api
    - healthcare-api

integrator_gate:
  enabled: false

agent_evaluator:
  enabled: true
  persona_id: default

maker_approval:
  enabled: true

theater:
  enabled: true
  max_message_chars: 1200
  show_evidence_links: true
  llm_summary: false

memory:
  retrieval_enabled: true
  index_contribution: true

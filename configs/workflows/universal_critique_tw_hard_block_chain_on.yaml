# Optional profile: implementation passes (no impl hard-block); test_writer
# ``hard_block_on_gate_fail`` + stubs; planner enabled — planner short-circuits
# when test_writer critique gate is FAIL.
extends: default
version: 1
universal_critique:
  implementation:
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
    hard_block_on_gate_fail: false
  test_writer:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
    hard_block_on_gate_fail: true
  planner:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
    hard_block_on_gate_fail: false
  frontend_writer:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
    hard_block_on_gate_fail: false
  module_integrator:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
    hard_block_on_gate_fail: false

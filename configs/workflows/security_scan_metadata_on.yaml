# Optional profile: on writer verifier failure, attach ``security_scan_*`` metadata to
# ``finding.created`` when ``security_scan_metadata_on_verify`` is true (no env required).
# ``NIMBUSWARE_ATTACH_SECURITY_SCAN_METADATA=0`` / ``false`` / ``no`` still suppresses scans.
extends: default
version: 1
security_scan_metadata_on_verify: true

# Optional profile: post-verify ``implementation.critique`` stub + ``hard_block_on_gate_fail``.
# When the last implementation critique gate is FAIL, integrator / agent-evaluator /
# self-refinement markers are skipped (tail in ``execute_writer_verifier_pass``).
extends: default
version: 1
integrator_gate:
  enabled: true
self_refinement:
  enabled: true
  version: 1
  description: "Workflow-opt-in self-refinement marker for hard-block operator tests."
universal_critique:
  implementation:
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
    hard_block_on_gate_fail: true

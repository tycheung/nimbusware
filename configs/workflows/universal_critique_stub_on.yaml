# Optional profile: stub-only universal critique panels after verify (no LLM, no env required).
# Env ``HERMES_STUB_IMPLEMENTATION_CRITICS`` etc. still override YAML when set non-empty.
version: 1
finding_fix_strictness:
  minimum_severity_requiring_fixes: MEDIUM
  also_require_fixes_for_low_severity: false
network_egress:
  scraper_role_allowlist: null
  domain_allowlist: null
  budget_bytes_per_run: null
scraper_fetch:
  enabled: false
  url: null
  urls: null
  actor_role_key: backend_writer
  max_attempts: 1
  backoff_seconds: 0
  max_bytes: null
  body_snippet_max_bytes: 256
  persist_artifacts_max_bytes_per_url: null
security_scan_metadata_on_verify: false
agent_evaluator:
  enabled: false
  persona_id: default
integrator_gate:
  enabled: false
self_refinement:
  enabled: false
universal_critique:
  implementation:
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
  test_writer:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
  planner:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
  frontend_writer:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
  module_integrator:
    enabled: true
    llm: false
    stub: true
    stage_failed_on_gate_fail: false
escalation:
  suppress_automatic_escalation: false

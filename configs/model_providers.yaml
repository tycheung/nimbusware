# Provider presets for Model Hub and ModelBindingResolver (v1.2).
# API keys are stored per-user in nimbusware_provider_connection — not in this file.
# Subscription OAuth (ChatGPT/Claude desktop) is deferred — use API-key providers only.

providers:
  - id: ollama
    kind: local
    label: Ollama
    default_base_url: http://127.0.0.1:11434
    connection_kind: api_key
  - id: openai
    kind: cloud
    label: OpenAI API
    connection_kind: api_key
    default_base_url: https://api.openai.com/v1
  - id: anthropic
    kind: cloud
    label: Anthropic API
    connection_kind: api_key
    default_base_url: https://api.anthropic.com
  - id: google
    kind: cloud
    label: Google Gemini
    connection_kind: api_key
    default_base_url: https://generativelanguage.googleapis.com/v1beta/openai
    probe_health_path: /models
  - id: xai
    kind: cloud
    label: Grok (xAI)
    connection_kind: api_key
    default_base_url: https://api.x.ai/v1
  - id: openrouter
    kind: cloud
    label: OpenRouter
    connection_kind: api_key
    default_base_url: https://openrouter.ai/api/v1
  - id: custom
    kind: cloud
    label: Custom OpenAI-compatible
    connection_kind: api_key
